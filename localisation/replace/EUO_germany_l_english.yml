 GER.1.t:0 "The New Year!"
 GER.1.d:0 "Among the earliest to awake this morning after the vibrant New Year's celebrations that occurred throughout last night were the government officials in Berlin---more specifically those who didn't drink last night with nothing to celebrate. Every one of them would awake to the beast that was the 2010 Plan. The mid to late 2000s has been a tumultuous time for the Reich, specifically during the 2007 economic crash. The reforms of 2009 brought forth some repair, although we still find ourselves suffering from the effects 2007 crash. Through the 2010 plan, we look to reverse the effects of the previous years of turmoil by increasing our investments into our allies in North America, as well as tightening our economic grip over our sphere of influence.\n\nAnother crisis the Reich faces is the ongoing armed conflict in West Africa. Despite our efforts to neutralize resistance activities in the area, the Tuareg peoples are in active rebellion, although intelligence reports indicate that more factions are likely involved. While reinforcements are already on their way to West Africa to support the French, the war is becoming increasingly unpopular at home. The Reichstag has demanded a swift and near effortless resolution to the war, or else funding may come short, and the French will be left to fend for themselves. Regardless of these shortcomings, the new year has come, and the Fuhrer will have to address the Reich, and guide us forth. Happy New Year!"
 GER.1.a:0 "Happy New Year!"