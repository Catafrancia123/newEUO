 GER.1.t:0 "The New Year!"
 GER.1.d:0 "Millions awoke this morning after the celebrations of last night. In Berlin, however, those who woke up first were the politicians—those who had nothing to drink last night, nothing to celebrate. Every politician in Berlin would awake to the beast of the 2010 Plan. The economy of the Reich suffered several setbacks in 2007 but recovered by 2009. The 2010 plan looked to reverse the effects of the 2007 Recession by investing in our allies in North America and tightening our economic grip over our Sphere. \n\nAnother crisis our nation faces is the ongoing insurgency in West Africa. Currently, only the Tuaregs of Azawad are in active rebellion, but our intel indicates that more factions are likely involved. Already, reinforcements are on the way to West Africa to support the French, but the war is becoming increasingly unpopular. The Reichstag demands a quick and easy resolution to the war, or else funding may come short, and the French will be on their own. Nevertheless, despite the background of war and budget, the new year is here, and the Führer will have to address the nation on where we go forward."
 GER.1.a:0 "Happy New Year!"