l_english: 
 DIX.1.t:0 "The National Union of Dixie"
 DIX.1.d:0 "When one thinks of Dixie, they think of vast mountains, forests, factories, mines. They think of the Industrial Heartland of the North American Collaborator States. When one thinks of its capital, Waschingten, they think of outdated, bloated bureaucracy. Everyone  knows how the Party in America is corrupt. Even though the whole Government of Dixie has very few saints. But there is one thing known. William Luther Pierce is a star shining amongst the villainy. The Leader of Dixie came to power after the toppling of Matthias Koehl in the late ‘80s. Everyone knows once Pierce is gone, so is Dixie. There have been rumors of a possible successor, the party leader Erich Gliebe, or the more popular Kevin Alfred Strom.\n\nRegardless of all of the strife in Dixie, the New Years Celebrations are nearing their end. Planning for immediate new projects have begun, and the next era will be the era of the National Union of Dixie. All must remember, Heil American Führer Pierce!"
 DIX.1.a:0 "Heil Pierce!"
 DIX.2.t:0 "A Meeting"
 DIX.2.d:0 "Kevin Alfred Strom was an unlikely guest of Party Minister Erich Gliebe. They had been bitter party rivals, after all, and there was still an uneasiness in his mind.\n\n"Good Morning, Kevin! Or, Mr. Strom, I should say. Sorry about the short notice. I know it must've been hard getting here that quickly." \n\nStrom was taken somewhat aback by this. Mr. Gliebe had never been so relaxed around him or had such high spirits. \n\n"Let me get you something to drink. Water? Wine?" \n\n"Water's just fine, thank you"\n\nMr. Gleibe came back with his spirits low. Concern fell over the still room. Strom felt his stomach drop and feared for the worst. He didn't know what would happen, but he knew it wouldn't spell good news for him, and, in his thoughts, for Dixie either. Finally, he got the courage to ask if something was the matter. Erich Gliebe paused for what seemed like hours and finally began to speak, clearing his throat."
 DIX.2.a:0 ""It's Führer Pierce, he has Cancer""