 DIX.1.t:0 "The National Union of Dixie"
 DIX.1.d:0 "Dixie, unlike in the antebellum era she has moved past being the land of cotton. Of the North American Collaborator States, she is the beating heart of industry. Yet this heart is run by parasites. Waschinsten has become a den of rattlesnakes and mosquitos, as the bureaucrats seek only to increase their networth. The Party, especially in the capital, is bloated and corrupt. It guts America, even in Dixie the rot is widespread. Yet, at her helm is a savior. A true Führer, that is best manner to describe William Luther Pierce. He seized Dixie after Koehl’s toppling in the 80s. Without him, Dixie will be lost. As he grows older, whispers of the next Führer to come grown louder and louder. Erich Gliebe or Kevin Alfred Strom are common subjects of talk. Regardless of the uncertainty, we are just wrapping up the New Year’s Celebration, and we are moving on with the projects of the year. This year is the start of Dixie’s Era. Never forget to say:"
 DIX.1.a:0 "Heil Pierce!"
 DIX.2.t:0 "A Meeting"
 DIX.2.d:0 "It was a great surprise to see Strom walk in the door. Gliebe and Strom had always been the bitterest of rivals, and the tension hung in the air like a noose. “Good Morning Kevin-or Mr. Strom” Erich sputtered Strom looked at the Party pin on Gliebe’s jacket, and then sudden made eye contact. “Just…euh…call Kevin, we’ve known each other long enough,” he replied. “Hey uh Sorry for the short notice,” Erich continued, “wait come on in.” As Kevin walked in, Mrs Gliebe greeted him, “would you like coffee or something else?” Kevin replied “Coffee’s just fine,” but he noticed that she looked rather somber. “Erich, what’s wrong with your wife” Kevin asked. “Take a seat,” Erich told him: “Now I don’t know how to phrase it, but… DIX.2.a:0 ""It's Führer Pierce, he has Cancer""
 DIX.3.t:0 "An Interview"
 DIX.3.d:0 "To address concerns and rumors among the Dixie People, President William Luther Pierce has agreed to a 60 Minutes interview. He appeared uncomfortable at first, likely due to the effects of his treatments. Reports are getting out not just to politicians but also to the press and citizens. The Union was beginning to show cracks. Cracks that Germania would not like to see on reports placed on their desks. Nevertheless, he held his head high. He would speak clearly and openly about the state of the Union. He knew what was needed and who could give it. Erich Gliebe was his legal successor. And it would be Gliebe who would"
 DIX.3.a:0 "He speaks words of wisdom"
 DIX.30.t:0 "The President's Health"
 DIX.30.d:0 "It has been months since our beloved leader, William Luther Pierce, had been diagnosed with Cancer. Even while sickly, he still spoke to the citizens of Dixie, telling them of his condition. The whole National Union of Dixie was struck with concern. Everyone knew that Führer Pierce was the one thing keeping the state together. Without him, who knew what could happen. \n\nReports of Resistance also arose even before the time of Pierce's Diagnosis. The Whole State was shaking, and everyone knew what would come next. The Purported American Resistance"
 DIX.30.a:0 "God Save Dixie"
 DIX.31.t:0 "Meeting of the Delegates"
 DIX.31.d:0 "Arriving just on time in "Bratislava" or for the purposes of the summit, "Pressburg," David Duke had prepared himself for this moment for weeks. Planning and calculating his every next move. From each foot, he would walk forward all the way to the topics at hand. And these were important topics. He arrived at the meeting point and noticed an abundance of delegates from all across Europe and North America. The nations of the "French Union" were not invited. Immediate discussions went swimmingly, and proposals to ease restrictions between the Italian and German Spheres were discussed. The talking went on for a few hours before they were allowed to retire to their hotel rooms. After changing into his everyday attire, he came across a delegate in the lobby. None other than Udo Voigt. \n\n"Herr Voigt? It is good to finally meet. I am David Duke. Dixie's delegate to the summit." \n\n Udo Voigt gave a warm smile. \n\n"Greetings! I am glad to meet you! I've heard much about the Great David Duke of Dixieland. You managed to negotiate well with the terrorists in Arkansas and Louisiana. The Reich thanks you greatly for your service." \n\nDuke nodded and smiled back. \n\n"Well, I was just about to head to the hotel bar. I think I could use a light drink. You are invited to join me if you'd like." \n\nDavid Duke felt calm, though still excited at the prospect of meeting a delegate from Berlin."
 DIX.31.a:0 ""I would gladly join you, sir.""
 DIX.35.t:0 "A Cosmic Goodbye"
 DIX.35.d:0 "Erich Gliebe was the last to enter the room. The hospital clock felt deafening to the onlookers in the room. The only thing more dreadful was the silence. Erich saw in the corner of the room, Kevin Alfred Strom, with a look of a hunter who had spotted his prey. He saw the hatred in Strom's eyes. \n\n"Late. Again. Of all the times... No matter. He isn't well, not at all. We don't know how much longer he has." \n\nGliebe frowned and moved closer to the hospital bed of William Luther Pierce. He spoke briefly but gained no response. Pierce had been sound asleep. Not a worry at heart. Content, maybe. Chatter began to trickle into the room from the suits outside the door. Eventually, even chatter amongst those in the room began. Except for Strom. He had announced his intention to stay with the president, not to move a muscle. Not an inch away from that chair where he sat. And Gliebe could tell he was speaking in earnest. There were no political plays at the moment, just a man caring for his father figure. A man whom he had looked up to so much that he had been the most practical choice for successor. But that was not realized. \n\nThe President's breathing had slowed. The Heart rate monitor had sped up. Every single suit outside rushed into the room. Strom pushed past anyone in his way just to get to Pierce. All for nothing. The Heart monitor stopped, and Pierce lay dead before them."
 DIX.35.a:0 "Sleep Well, Mr. President"
 DIX.36.t:0 "An Inaugural Address"
 DIX.36.d:0 "Historically, most Inaugural Addresses of the United States Presidents had been held in the open. Amongst large crowds gathered to celebrate their new President. The Inauguration of Erich Gliebe was much different. Held in a dingy conference room in the National Alliance headquarters, it was attended by only the closest party confidants. One notable absence was Kevin Alfred Strom, a man most feared and hated even amongst National Alliance politicians."
 DIX.36.a:0 "-"
 
