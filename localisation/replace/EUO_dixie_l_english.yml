 POLITICS_WILLIAM_LUTHER_PIERCE_DESC:0 "Much can be said about the great President of the National Union of Dixie. After all, William Luther Pierce has done everything short of uniting the former United States. Throughout his life, Pierce has made it his goal to unite the Aryan peoples of America into a single people. From his early career in teaching to his involvement with the American National Socialist Party. Pierce was a leading figure in the ANSP and became quite popular amongst the masses. In particular, with some German agents. Despite some run-ins with the law and accusations of espionage, he made it through the turbulent 60s with nothing but some scratches to his reputation. He even managed to write a prominent novel in the post-collapse United States, The Turner Diaries. By the time of the '80s, he had moved up the ranks of the ANSP, much to the chagrin of Matthias Koehl. \n\nHis "Arch-enemy" within the ANSP was very much Mr. Koehl. The two would often butt heads in the latter direction of the party, but it didn't start out that way. Initially, they had been quite close friends, even allying against some of the later decisions of the Party's founder and leader, George Lincoln Rockwell. But their relationship began to deteriorate over time, and by the time of the 1985 Coup d'état and the assassination of Rockwell, Pierce was passed over by the much more erratic Koehl. His immediate purges of the party leadership led to the near collapse of the party and the near abandonment of the plotters by Germany. But upon Koehl's sack by Germany, they found a grand replacement in William Luthern Pierce. At this point, he had founded his own party, the National Alliance. At this point, as an up-and-coming politician, he was an easy choice to lead the '85 movement against the government forces in Denver and Houston. After consolidating power in the newly formed "National Union of Dixie," Pierce survived a bout of sickness, a massive operation in the early 2000s, and even an attempt on his life. But his health is not the best it could be. Who's to say what the Union will be like if the dear President were to leave this world?"
