 goldmine_of_the_reich:0 "Goldmine of the Reich"
 goldmine_of_the_reich_desc:0 "The National Union is one of the Richest and most profitable states in the whole Kontinentalpakt. Our Status as Germany's "Golden Child" has brought us both envy and admiration from our peers. Not only in North America but also in Europe. If Ukraine is the breadbasket of the Reich, then Dixie is the bank. The Nation that keeps the whole Pakt afloat. Or so we'd like to think. The Reich has become increasingly worried about putting all its eggs in one basket, and since the 2007 Crash, we have faced major losses in German business. \n\nWe do have high hopes for the future, however. The state of the world is becoming increasingly tumultuous, and while that may bring bad fortune to some, it could bring good fortune to others. We know the war in West Africa is one thing we should keep a keen eye on if we want to think about getting our guarantee of economic dominance back."
 dixie_prosperity:0 "Dixie Prosperity"
 dixie_prosperity_desc:0 "We have truly peaked in this German Golden Age. A testament to the most noble of National Socialists, our nation is one that has seen so much growth. It's as if we had become a brother to Germany. After throwing off the chains of liberal democracy in '85, we finally entered even an "American Golden Age" so to speak. The new pro-Pakt and pro-Sphere regimes brought with them close ties to the governments in Germania and Tokyo. We even had some freinds in Rome!"
