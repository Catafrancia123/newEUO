l_english:
 ENG_national_front_disco:0 "The National Front Disco"
 ENG_national_front_disco_desc:0 "Jim Dowson's scathing "Christmas Day Speech" against Chief Martin Webster has sent shockwaves throughout the nation. The National Front has independently resolved to hold a motion of no confidence against the Chief, but who could possibly replace him...?"
 ENG_a_new_path:0 "A New Path"
 ENG_a_new_path_desc:0 "The Social Republic cannot continue in its current, stagnant state. That much is obvious. It's so obvious, that Rupert Lowe's Reformists have been handed a steady majority! It's time to change things around..."
 ENG_restore_britain:0 "Restore Britain"
 ENG_restore_britain_desc:0 "Britannia has been beaten and bruised over the past century. It's going to take radical change to make her better."
 ENG_parliament_returns:0 "Resurrect Parliament"
 ENG_parliament_returns_desc:0 "The Houses of Parliament worked just fine, before the German jackboot trampled it down. We should work to bring back parliamentarianism, and stop this rule by decree."
 ENG_abolish_social_republic:0 "Abolish the Social Republic"
 ENG_abolish_social_republic_desc:0 "The 'British Social Republic' is a foreign concept, forced upon us after the ashes of the Second Great War. With German influence waning, it's time to end this rotten institution. Long live the Commonwealth of Britain!"
 ENG_negotiating_with_berlin:0 "Negotiations with Germania"
 ENG_negotiating_with_berlin_desc:0 "The restrictions on the British State placed by Deustchland are unfair and strangling. We must renegotiate these treaties, for mutual benefit."
 ENG_rebuild_british_army:0 "Rebuild the British Army"
 ENG_rebuild_british_army_desc:0 "With more autonomy within the German sphere, we should look to reconstruct a strong army beyond a mere defence force,  to ween off our reliance on German protection."
 ENG_demilitarise_the_party:0 "Defang the Party"
 ENG_demilitarise_the_party_desc:0 "The National Front has ruled Britain with an iron fist for many years now, in large part thanks to their thuggish stormtroopers, the Free Corps. In our new Britain, such thuggery is made obsolete. They must have their claws removed."
 ENG_demote_collett:0 "Demote the Free Corps"
 ENG_demote_collett_desc:0 "Mark Collett couldn't fight sleep, lick a stamp or take the cat out and I think he'd admit that himself. He's a brash, inexperienced hooligan and he must be removed from the National Council."
 ENG_hamilton_compromise:0 "The Hamilton Compromise"
 ENG_hamilton_compromise_desc:0 "Neil Hamilton isn't a bad guy per-se, he's just misguided and ignorant. If we guarantee him a place in our new Britain, he will come quietly with us."
 ENG_send_fascists_abroad:0 "Send the Fascists Abroad"
 ENG_send_fascists_abroad_desc:0 "Dowson and Raikes are big thorns in our side, and they're too popular to just demote like certain others. By offering them prestigious Ambassadorships in Germany and Italy, they can be kept away from frontline politics without too much hassle."
 ENG_steady_as_she_goes:0 "Steady As She Goes"
 ENG_steady_as_she_goes_desc:0 "Webster was personally a problem, but ideologically there's nothing wrong with the direction we are heading in. Neil Hamilton represents this view, and he has resoundingly been voted in as the new Chief of the country. Long live the Social Republic!"
 ENG_work_with_the_free_corps:0 "Work with the Free Corps"
 ENG_work_with_the_free_corps_desc:0 "The establishment sees the Free Corps as a parasite, as something to be feared. If we work with them, however, perhaps they can become useful."
 ENG_crack_down_on_dissent:0 "Crack Down on Dissent"
 ENG_crack_down_on_dissent_desc:0 "These yobbos need to get it into their thick skulls that we will not surrender the spirit of the nation for their utopian "democracy"."
 ENG_reinforce_kp_commitments:0 "Reinforce Our Commitments to the Kontinentalpakt"
 ENG_reinforce_kp_commitments_desc:0 "Better the devil you know! We are better off being buddy-buddy with Germania than we are on our own alone in the cold."
 ENG_meet_with_barratt:0 "A Meeting in Dublin"
 ENG_meet_with_barratt_desc:0 "There's no doubt that there is great animosity between Britain and Ireland, especially with the situation in Ulster. We should organise a meeting between ourselves, Dublin and Gusty Spence, mediated by Germany, to decide the fate of the region."
 ENG_civilian_govt_in_belfast:0 "Civilian Government in Belfast"
 ENG_civilian_govt_in_belfast_desc:0 "Now that everything's been said and done, it's time to officially organise a Civilian led govt in Ulster- and in return, both we and Dublin shall recognise them."
 ENG_coopt_patriotic_hooliganism:0 "Co-Opt Patriotic Hooliganism"
 ENG_coopt_patriotic_hooliganism_desc:0 "Football Hooliganism is rife within this country, and deeply divisive. However, there's no reason we can't make good use of this. These men are patriotic and fanatic- perfect for our ranks."
 ENG_hunt_down_galloway:0 "The Hunt for Galloway"
 ENG_hunt_down_galloway_desc:0 "'Gorgeous George' Galloway has long been a thorn in our side. This commie insurgent is at the heart of the riots and protests against us. The sooner we take him out, the better."
 ENG_monopolise_national_socialism:0 "Monopolise National-Socialism"
 ENG_monopolise_national_socialism_desc:0 "To secure our leadership of the National Front, we must monopolise our control over the ideology of National-Socialism. Unpredictable actors such as Jim Dowson need to be sidelined and purged."
 ENG_demote_dowson:0 "Demote Big Jim"
 ENG_demote_dowson_desc:0 "'Big Jim' Dowson is unruly, unreliable and most importantly in direct opposition to our rule. We need to remove him from the council and replace him with someone more amenable."
 ENG_take_down_mosleyites:0 "Purge the Mosleyites"
 ENG_take_down_mosleyites_desc:0 "We couldn't possibly get away with purging two heavy hitters in one go, however luckily Gary Raikes isn't popular enough that anyone would stand up to us if he disappeared in... other ways. A bit of mercury in his tea, and this problem will solve itself..."
 ENG_legacy_of_jordan:0 "Legacy of Chief Jordan"
 ENG_legacy_of_jordan_desc:0 "Colin Jordan was until recently our longtime leader and director of this state. We must honour and continue his legacy!"
 ENG_global_cause:0 "The Global Cause"
 ENG_global_cause_desc:0 "We must not just confine ourselves to our stormy isle. British soldiers will fight in every theatre in the world to advance the cause of National Socialism!"
 ENG_pub_nazism:0 "Pub Nazism"
 ENG_pub_nazism_desc:0 "The Pub is the staple of British culture. We should encourage this- indeed, the very cause of National Socialism began in a German Beer Hall! Let the banners fly and the pints pour!"
 ENG_imperial_nostalgia:0 "Imperial Nostalgia"
 ENG_imperial_nostalgia_desc:0 "Britain once held a mighty empire, the largest the world ever knew, until our benefactors came along. We can and should aspire to reclaim our great empire, however!"
 ENG_petition_return_of_atlantic_territories:0 "Petition the Return of Atlantic Territories"
 ENG_petition_return_of_atlantic_territories_desc:0 "There are bases all up and down the Atlantic that have been occupied by the Germans for decades, yet the population are still of Anglo-Saxon stock and speak English. Now that they are rightful rulers of the world, perhaps they would be willing to relinquish these bases back to us."
 ENG_the_monarchy_question:0 "The Monarchy Question"
 ENG_the_monarchy_question_desc:0 "We have a hastily elected and essentially powerless president now, which leaves some of the more conservative minded people to ask- is the Commonwealth truly necessary, or is it time we return to a United Kingdom?"
 ENG_french_connection:0 "The French Connection"
 ENG_french_connection_desc:0 "France still holds sway over some of its former colonies. Perhaps, with their assistance, we could look to reclaim our own..."
 ENG_ghana_reclamation:0 "Reclamation of Ghana"
 ENG_ghana_reclamation_desc:0 "Ghana has fallen to the tides of revolution, and actively agitates against British interests. We have an excuse to go in, so let's attack!"
 ENG_return_of_the_exiles:0 "Return of the Exiles"
 ENG_return_of_the_exiles_desc:0 "Over the decades, for one reason or another, many patriots have had to leave under the weight of the Nazi regime. Now it's safe for them, we should encourage their return."
 ENG_support_leakey:0 "Support the Leakey Regime"
 ENG_support_leakey_desc:0 "In the years since the fall of Britain during the Second War, only one former Imperial possesion has held firm. Kenya, firmly steered by the loyalist Leakey family, reorganised into the East African Federation. We should support their cause."
 ENG_caribbean_possessions:0 "The Caribbean Possessions"
 ENG_caribbean_possessions_desc:0 "With the glorious global power projection of the KP, it should be simple to reclaim Guayana, Jamaica and Belize. How could they refuse?"
 ENG_local_democracy:0 "Local Democracy"
 ENG_local_democracy_desc:0 "With our reforms proving popular, it's time to open up the regional side of things. No longer being ruled by appointed 'governors', metropolitan regions will now have their own elected mayoralities!"
 ENG_distance_from_KP:0 "Distancing from the Kontinentalpakt"
 ENG_distance_from_KP_desc:0 "The KP served us well for some time, but the political situation is clearly moving away from them. It's time to forge new friendships."
 ENG_ally_portugal:0 "Something New"
 ENG_ally_portugal_desc:0 "There are certain aligned nations that would do much better united in one sphere. We should reach out to them."
 ENG_lowe_allies_italy:0 "Something Old"
 ENG_lowe_allies_italy_desc:0 "Italy's Salo Accord is perfectly suited to our needs. We shall buddy up with them, in the face of growing German might."
 ENG_irish_friendship_treaty:0 "Irish Friendship Treaty"
 ENG_irish_friendship_treaty_desc:0 "It would be foolish to try to stir up tensions with Ireland more than they already are. Quite the opposite, we should attempt to organise a treaty of mutual friendship and take them away from the KP!"
 ENG_claims_on_african_territories:0 "Claims on African Colonies"
 ENG_claims_on_african_territories_desc:0 "With Ghana secured, there will be no question now about laying our claim to the rest of Anglophone Africa."
 ENG_fascist_revolution:0 "Our Fascist Revolution"
 ENG_fascist_revolution_desc:0 "The new course has been chartered! The old ways aren't working, but "reform" and democracy is the last thing we need. It's time to follow a new fascist direction."
 ENG_follow_christ:0 "Follow Christ"
 ENG_follow_christ_desc:0 "Christ, Not Man, Is King. We must follow this mantra to a T. Cults of personality are dangerous and evil. Welcome to the British Theocracy."
 ENG_follow_mosley:0 "Follow Mosley"
 ENG_follow_mosley_desc:0 "The way forward has already been laid out before us! In the 1930s, the great Oswald Mosley, far ahead of his time, already knew all the solutions. Comrades, the voices!"
 ENG_our_new_ecumenism:0 "Our New Ecumenism"
 ENG_our_new_ecumenism_desc:0 "How can Christianity survive without the unification of the Church? How can Christians kill each other then claim to follow the word of the Lord? It is vital we bring together all Christians in a new, healing way."
 ENG_penetrate_universities:0 "Penetrate the Universities"
 ENG_penetrate_universities_desc:0 "England has some of the most prestigious universities in the world, but they've long resisted our ideology. No more! We shall show the students that we, too, can work for them."
 ENG_blackshirts:0 "Hurrah for the Blackshirts!"
 ENG_blackshirts_desc:0 "The Free Corps is dangerous and ideologically opposed. By resurrecting the Blackshirts of the 30s, we can create a new, parallel organisation loyal to Raikes and Mosley."
 ENG_political_appointments_to_military:0 "Military Patronage"
 ENG_political_appointments_to_military_desc:0 "By appointing political loyalists to high up military positions, in spite of their experience, we can maintain control over every facet of British society."
 ENG_pop_balloons:0 "Pop the Balloons"
 ENG_pop_balloons_desc:0 "British politics is riddled with morons, idiots, gangsters... We must conduct a grand purge of these fools if we are to revitalise this Social Republic."
 ENG_knights_templar_international:0 "The New Knights Templar"
 ENG_knights_templar_international_desc:0 "In our glorious Christian state, we shall forge the Knights Templar anew, to spread the word of Christ across the Grlobe!"
 ENG_technocratic_ascendancy:0 "Technocratic Ascendency"
 ENG_technocratic_ascendancy_desc:0 "Britain is small and, to be honest, weak. We cannot win the numbers game; but we can win by superiority of material. Invest, invest, invest!"
 ENG_send_yerbury_to_belfast:0 "Send Yerbury to Belfast"
 ENG_send_yerbury_to_belfast_desc:0 "We need to find out what's actually going on in Ulster. The Troubles have been raging for too long, and it's high time this new government puts a stop to the bloodshed!"
 ENG_ulster_social_republic:0 "Ulster Social Republic"
 ENG_ulster_social_republic_desc:0 "Gusty Spence knows he can't survive without our covert support anyway. The Irish ultimately can't resist our force of will. It's time to impose our suzereinty over Northern Ireland."
 ENG_hail_raikes:0 "Hail Raikes"
 ENG_hail_raikes_desc:0 "All life, work and death must be in furtherence to the great Director. Raikes knows best. Raikes is best. Hail Raikes!"
 ENG_march_on_london:0 "March on London"
 ENG_march_on_london_desc:0 "We have tolerated dissidents in our council for far too long. It's time to march the Blackshirts on London and purge these woke libtards once and for all. It will be bloody... and it will be incredible"
 ENG_realign_with_rome:0 "Realign with Rome"
 ENG_realign_with_rome_desc:0 "Germany doesn't serve us, either as a partner or ideologically speaking. But we need friends in this cold, harsh world. [ITA.GetNameDef] aligns with us well, and we'd be suited alongside them as comrades."
 ENG_aim_high_vote_lowe:0 "Aim High, Vote Lowe!"
 ENG_aim_high_vote_lowe_desc:0 "todo"
 ENG_rise_of_evil:0 "Rise of Evil"
 ENG_rise_of_evil_desc:0 "The unthinkable has happened. The SS and the Free Corps have managed to wrestle complete control of the party. Now under Director Collett, the Ordenstaat will be created..."
 ENG_deputy_directors_push:0 "The Deputy Director's Push"
 ENG_deputy_directors_push_desc:0 "Director Webster is comatose, the nation is in open revolt and the National Front has been split in two. Only Deputy Director Bowden can save us now!"
 ENG_CLEAR_THEM_OUT:0 "CLEAR THEM OUT!"
 ENG_CLEAR_THEM_OUT_desc:0 "These rabble rousers, so-called revolutionaries, are anti-British and must be destroyed. We will sweep them away and bring in our glorious National Socialist dictatorship of the people."
 ENG_LIBERALISM_IS_MORAL_SYPHILLIS:0 "LIBERALISM IS MORAL SYPHILLIS!"
 ENG_LIBERALISM_IS_MORAL_SYPHILLIS_desc:0 "AND I'M STEPPING OVER IT!"
 ENG_assume_complete_control:0 "Assuming Complete Control"
 ENG_assume_complete_control_desc:0 "The Civil War is over, but it's clear that Director Webster is not waking up. That may be for the best- he was an idiot and a homosexual, after all. It's time for Bowden to take his rightful position as Director."
 ENG_the_economy:0 "Questions of the Economy"
 ENG_the_economy_desc:0 "With the NF council having now committed to a long-term economic strategy, it's time to implement it."
 ENG_british_self_defence_force:0 "The British Self-Defence Force"
 ENG_british_self_defence_force_desc:0 "After Sealion, the Germans stripped us of most of our military capacities. However, we are allowed to maintain a small but elite 'Self-Defence Force'."
